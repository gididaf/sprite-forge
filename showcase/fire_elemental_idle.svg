<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Warm ground shadow with flame-glow pulse -->
  <ellipse cx="32" cy="58" rx="13" ry="2.5" fill="#ff5500" opacity="0.4">
    <animate attributeName="rx" values="13;14;15;14.5;13.5;14;15;14;13.5;14;15;13.5" dur="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.55;0.45;0.5;0.4;0.55;0.5;0.4;0.45;0.55;0.4;0.5" dur="0.6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Body sway group: subtle lean back and forth -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
                      values="0 32 58; 1.5 32 58; 0 32 58; -1.8 32 58; 0 32 58; 2 32 58; 1 32 58; -1 32 58; -2 32 58; 0 32 58; 1.5 32 58; 0 32 58"
                      dur="0.6s" repeatCount="indefinite"/>

    <!-- OUTER flame (dark red base) — most active flicker -->
    <path d="M 32,56 Q 14,40 18,22 Q 26,10 32,4 Q 38,10 46,22 Q 50,40 32,56 Z" fill="#cc2200">
      <animate attributeName="d"
               values="M 32,56 Q 14,40 18,22 Q 26,10 32,4 Q 38,10 46,22 Q 50,40 32,56 Z;
                       M 32,56 Q 12,42 18,20 Q 24,8 33,2 Q 38,12 44,18 Q 52,42 32,56 Z;
                       M 32,56 Q 16,40 16,24 Q 28,10 32,5 Q 36,10 48,24 Q 48,40 32,56 Z;
                       M 32,56 Q 14,42 18,22 Q 26,12 32,6 Q 40,10 46,20 Q 50,42 32,56 Z;
                       M 32,56 Q 12,40 16,20 Q 24,10 31,3 Q 38,10 48,22 Q 52,40 32,56 Z;
                       M 32,56 Q 14,38 18,22 Q 28,8 32,4 Q 36,12 44,22 Q 50,38 32,56 Z;
                       M 32,56 Q 16,40 20,20 Q 26,10 33,4 Q 40,8 46,20 Q 48,40 32,56 Z;
                       M 32,56 Q 14,42 16,22 Q 26,10 32,5 Q 38,10 48,22 Q 50,42 32,56 Z;
                       M 32,56 Q 12,40 18,18 Q 26,8 32,3 Q 38,10 46,18 Q 52,40 32,56 Z;
                       M 32,56 Q 16,42 18,22 Q 28,12 32,6 Q 36,12 44,22 Q 48,42 32,56 Z;
                       M 32,56 Q 14,40 18,22 Q 26,10 32,4 Q 38,10 46,22 Q 50,40 32,56 Z;
                       M 32,56 Q 14,40 18,22 Q 26,10 32,4 Q 38,10 46,22 Q 50,40 32,56 Z"
               dur="0.6s" repeatCount="indefinite"/>
    </path>

    <!-- MIDDLE flame (orange) -->
    <path d="M 32,54 Q 20,42 24,26 Q 28,16 32,10 Q 36,16 40,26 Q 44,42 32,54 Z" fill="#ff6611">
      <animate attributeName="d"
               values="M 32,54 Q 20,42 24,26 Q 28,16 32,10 Q 36,16 40,26 Q 44,42 32,54 Z;
                       M 32,54 Q 22,40 22,24 Q 30,12 32,8 Q 36,18 42,24 Q 42,40 32,54 Z;
                       M 32,54 Q 20,42 26,28 Q 30,18 32,11 Q 34,16 38,28 Q 44,42 32,54 Z;
                       M 32,54 Q 24,44 24,26 Q 28,16 32,10 Q 36,16 42,28 Q 40,44 32,54 Z;
                       M 32,54 Q 20,40 22,24 Q 28,14 32,9 Q 36,16 42,26 Q 44,40 32,54 Z;
                       M 32,54 Q 22,42 26,24 Q 30,14 32,10 Q 34,18 40,24 Q 42,42 32,54 Z;
                       M 32,54 Q 24,42 24,28 Q 28,16 33,11 Q 38,16 42,28 Q 40,42 32,54 Z;
                       M 32,54 Q 20,40 22,24 Q 30,14 32,8 Q 36,16 40,24 Q 44,40 32,54 Z;
                       M 32,54 Q 22,44 26,26 Q 30,14 32,10 Q 34,18 38,26 Q 42,44 32,54 Z;
                       M 32,54 Q 22,42 24,26 Q 28,16 32,10 Q 36,16 42,26 Q 42,42 32,54 Z;
                       M 32,54 Q 20,42 24,26 Q 28,16 32,10 Q 36,16 40,26 Q 44,42 32,54 Z;
                       M 32,54 Q 20,42 24,26 Q 28,16 32,10 Q 36,16 40,26 Q 44,42 32,54 Z"
               dur="0.6s" repeatCount="indefinite"/>
    </path>

    <!-- INNER flame (yellow) -->
    <path d="M 32,50 Q 24,42 26,30 Q 30,22 32,18 Q 34,22 38,30 Q 40,42 32,50 Z" fill="#ffcc11">
      <animate attributeName="d"
               values="M 32,50 Q 24,42 26,30 Q 30,22 32,18 Q 34,22 38,30 Q 40,42 32,50 Z;
                       M 32,50 Q 26,40 26,28 Q 30,20 32,16 Q 34,22 38,28 Q 38,40 32,50 Z;
                       M 32,50 Q 24,42 28,30 Q 30,22 32,18 Q 34,22 36,30 Q 40,42 32,50 Z;
                       M 32,50 Q 26,44 26,30 Q 30,22 32,18 Q 34,22 38,30 Q 38,44 32,50 Z;
                       M 32,50 Q 24,40 26,28 Q 30,20 32,16 Q 34,22 38,28 Q 40,40 32,50 Z;
                       M 32,50 Q 26,42 26,28 Q 30,20 32,18 Q 34,22 38,28 Q 38,42 32,50 Z;
                       M 32,50 Q 26,42 26,30 Q 30,22 32,19 Q 34,22 38,30 Q 38,42 32,50 Z;
                       M 32,50 Q 24,40 28,28 Q 30,20 32,17 Q 34,22 36,28 Q 40,40 32,50 Z;
                       M 32,50 Q 26,44 28,30 Q 30,22 32,18 Q 34,22 36,30 Q 38,44 32,50 Z;
                       M 32,50 Q 24,42 26,30 Q 30,22 32,18 Q 34,22 38,30 Q 40,42 32,50 Z;
                       M 32,50 Q 24,42 26,30 Q 30,22 32,18 Q 34,22 38,30 Q 40,42 32,50 Z;
                       M 32,50 Q 24,42 26,30 Q 30,22 32,18 Q 34,22 38,30 Q 40,42 32,50 Z"
               dur="0.6s" repeatCount="indefinite"/>
    </path>

    <!-- WHITE-HOT core (pulses subtly) -->
    <ellipse cx="32" cy="42" rx="3" ry="6" fill="#fff299" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0.95;0.8;0.9;0.85;0.95;0.85" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="6;5.5;6.5;6;5.5;6.5;6" dur="0.6s" repeatCount="indefinite"/>
    </ellipse>

    <!-- FACE on the white-hot core -->
    <g>
      <!-- Subtle facial drift -->
      <animateTransform attributeName="transform" type="translate"
                        values="0,0; 0.3,0; 0,-0.2; -0.3,0; 0,0.2; 0.2,0; 0,0; -0.2,-0.2; 0,0; 0.3,0; 0,0; 0,0"
                        dur="0.6s" repeatCount="indefinite"/>

      <!-- Eyes (whites) -->
      <ellipse cx="28" cy="38" rx="2" ry="2.5" fill="#ffffff">
        <animate attributeName="ry" values="2.5;2.5;2.5;2.5;2.5;0.3;2.5;2.5;2.5;2.5;2.5;2.5" dur="2.4s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="36" cy="38" rx="2" ry="2.5" fill="#ffffff">
        <animate attributeName="ry" values="2.5;2.5;2.5;2.5;2.5;0.3;2.5;2.5;2.5;2.5;2.5;2.5" dur="2.4s" repeatCount="indefinite"/>
      </ellipse>
      <!-- Iris (orange glow) -->
      <circle cx="28" cy="38" r="1.3" fill="#ff4400"/>
      <circle cx="36" cy="38" r="1.3" fill="#ff4400"/>
      <!-- Pupil -->
      <circle cx="28" cy="38" r="0.7" fill="#1a0a00">
        <animate attributeName="r" values="0.7;0.7;0.7;0.7;0.7;0.1;0.7;0.7;0.7;0.7;0.7;0.7" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="36" cy="38" r="0.7" fill="#1a0a00">
        <animate attributeName="r" values="0.7;0.7;0.7;0.7;0.7;0.1;0.7;0.7;0.7;0.7;0.7;0.7" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <!-- Catchlight (white reflection) -->
      <circle cx="28.4" cy="37.6" r="0.3" fill="#ffffff"/>
      <circle cx="36.4" cy="37.6" r="0.3" fill="#ffffff"/>

      <!-- Mouth (slight breathing motion) -->
      <path d="M 28,44 Q 32,46.5 36,44" stroke="#1a0a00" stroke-width="0.8" fill="none">
        <animate attributeName="d"
                 values="M 28,44 Q 32,46.5 36,44;
                         M 28,44 Q 32,47 36,44;
                         M 28,44 Q 32,46 36,44;
                         M 28,44 Q 32,47.2 36,44;
                         M 28,44 Q 32,46.5 36,44"
                 dur="1.2s" repeatCount="indefinite"/>
      </path>
      <!-- mouth highlight (inside) -->
      <path d="M 30,45 Q 32,46 34,45" stroke="#ff4400" stroke-width="0.4" fill="none"/>
    </g>
  </g>

  <!-- EMBER PARTICLES (multiple, varied sizes, drift up with slight horizontal sway) -->
  <g>
    <!-- ember 1: large yellow, rises center-left -->
    <circle r="1.2" fill="#ffee44">
      <animate attributeName="cx" values="24;22;25;23;24" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="22;14;8;4;22" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0.7;0;0" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.2;1;0.6;0.3;1.2" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <!-- ember 2: white-hot, fast, rises center -->
    <circle r="0.9" fill="#ffffff">
      <animate attributeName="cx" values="32;33;31;32;32" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="16;10;4;0;16" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0.6;0;0" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="r" values="0.9;0.7;0.5;0.2;0.9" dur="0.9s" repeatCount="indefinite"/>
    </circle>
    <!-- ember 3: orange, rises right -->
    <circle r="1" fill="#ffaa00">
      <animate attributeName="cx" values="40;42;39;41;40" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="22;14;6;2;22" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0.5;0;0" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1;0.8;0.5;0.2;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <!-- ember 4: small yellow, rises far-left -->
    <circle r="0.6" fill="#ffcc22">
      <animate attributeName="cx" values="20;18;21;19;20" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="28;18;8;2;28" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0.4;0;0" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <!-- ember 5: small white, rises far-right -->
    <circle r="0.5" fill="#ffffff">
      <animate attributeName="cx" values="44;43;45;44;44" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="28;18;10;4;28" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0.5;0;0" dur="1.1s" repeatCount="indefinite"/>
    </circle>
    <!-- ember 6: tiny, very fast, white-hot -->
    <circle r="0.4" fill="#ffffff">
      <animate attributeName="cx" values="36;38;35;36" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="20;10;2;20" dur="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0;0" dur="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
