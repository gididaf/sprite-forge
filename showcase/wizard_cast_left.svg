<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <animateTransform attributeName="transform" type="translate" values="0,0; 0,-0.5; 0,0" dur="1s" repeatCount="indefinite"/>
  <ellipse cx="34" cy="60" rx="11" ry="1.8" fill="rgba(0,0,0,0.2)"/>

  <!-- robe -->
  <polygon points="30,30 40,30 44,58 28,58" fill="#3a2a6a"/>
  <polygon points="30,30 40,30 42,42 30,42" fill="#4a3a7a"/>
  <rect x="30" y="40" width="12" height="1" fill="#2a1a5a"/>
  <rect x="30" y="57" width="4" height="3" fill="#1a0a1a"/>
  <rect x="38" y="57" width="4" height="3" fill="#1a0a1a"/>

  <!-- BACK ARM (tucked at side) -->
  <rect x="38" y="32" width="4" height="11" fill="#3a2a6a"/>
  <circle cx="40" cy="43" r="1.8" fill="#e8b88a"/>

  <!-- HEAD (profile, facing LEFT) -->
  <circle cx="32" cy="20" r="6" fill="#e8b88a"/>
  <!-- prominent nose pointing LEFT -->
  <polygon points="26,19 22,21 26,23" fill="#d89868"/>
  <circle cx="28" cy="19" r="0.9" fill="#000"/>
  <rect x="26" y="16.5" width="5" height="1.2" fill="#dddddd"/>

  <!-- beard (long, flowing LEFT/down) -->
  <polygon points="25,22 33,22 33,34 28,34 23,28" fill="#ffffff"/>
  <polygon points="25,22 31,22 30,30 26,29" fill="#e8e8e8"/>
  <!-- mustache -->
  <polygon points="24,21 27,22 25,23" fill="#ffffff"/>

  <!-- WIZARD HAT (tip slightly forward-left) -->
  <polygon points="26,14 39,14 22,1" fill="#3a2a6a"/>
  <polygon points="22,1 27,7 24,10" fill="#2a1a5a"/>
  <rect x="25" y="13" width="15" height="2" fill="#2a1a5a"/>
  <polygon points="29,13.5 30,12 31,13.5 32.5,13.5 31.3,14.3 31.7,15.5 30,14.8 28.3,15.5 28.7,14.3 27.5,13.5" fill="#ffd700"/>

  <!-- STAFF (held in front arm, angled back-to-front, tip to upper left) -->
  <g transform="translate(26,38)">
    <animateTransform attributeName="transform" type="rotate" values="-15 0 0; -12 0 0; -15 0 0" dur="1s" repeatCount="indefinite" additive="sum"/>
    <rect x="-1.5" y="-38" width="3" height="42" fill="#6b4423"/>
    <rect x="-1.5" y="-38" width="3" height="3" fill="#4a2a11"/>
    <!-- orb glow -->
    <circle cx="0" cy="-42" r="6" fill="#00ccff" opacity="0.35">
      <animate attributeName="r" values="5;7;5" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-42" r="4" fill="#66eeff" opacity="0.85">
      <animate attributeName="r" values="3.5;4.5;3.5" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-42" r="2" fill="#ffffff"/>
  </g>

  <!-- FRONT (casting) ARM - extends forward-left, grips staff -->
  <g transform="translate(30,32)">
    <animateTransform attributeName="transform" type="rotate" values="-45 0 0; -55 0 0; -45 0 0" dur="1s" repeatCount="indefinite" additive="sum"/>
    <rect x="-2" y="0" width="4" height="10" fill="#4a3a7a"/>
    <circle cx="0" cy="10" r="2" fill="#e8b88a"/>
  </g>

  <!-- SPELL EFFECT: sparks radiating from orb position (world ≈ 16-18, -4 after rotation). Orb world pos after translate(26,38) and the orb at (0,-42): roughly (26,-4). But rotation of -15° around translate point (26,38) moves orb to (26 - 46*sin(15°), 38 - 46*cos(15°)) ≈ (14, -6). So spell at ~(14,-6) which is off-screen top. Instead add sparks along staff and above orb. Use a group at roughly (14,-6) = clipped, so put at (18, 4). -->
  <g>
    <circle cx="20" cy="6" r="1.2" fill="#ffff00">
      <animate attributeName="cy" values="8;0;8" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="12" cy="10" r="1" fill="#ffffff">
      <animate attributeName="cy" values="12;4;12" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="14" r="0.8" fill="#66eeff">
      <animate attributeName="opacity" values="1;0.3;1" dur="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
