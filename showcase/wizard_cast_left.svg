<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ground shadow -->
  <ellipse cx="34" cy="60" rx="11" ry="1.8" fill="#000000" opacity="0.22">
    <animate attributeName="rx" values="11;11.5;12;12.5;13;13;12.5;12;11.5;11;11;11" dur="1.2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Body lean group: subtle idle sway, lean back for wind-up, forward for cast, recover -->
  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="0,0; 0,-0.3; 0.5,-0.3; 0.8,-0.5; 0.6,-0.4; -0.5,0.3; -1.2,0.5; -1,0.4; -0.5,0.2; 0,0; 0.2,-0.2; 0,0"
                      dur="1.2s" repeatCount="indefinite"/>

    <!-- ROBE / body -->
    <g>
      <!-- main robe body -->
      <polygon points="28,30 40,30 44,58 24,58" fill="#3a2a6a"/>
      <!-- robe inner highlight -->
      <polygon points="28,30 40,30 42,46 28,46" fill="#4a3a7a"/>
      <polygon points="28,30 40,30 38,36 30,36" fill="#5a4a8a"/>
      <!-- robe shadow folds -->
      <polygon points="30,36 32,58 28,58 28,40" fill="#2a1a5a"/>
      <polygon points="38,36 36,58 40,58 40,40" fill="#2a1a5a"/>
      <!-- belt -->
      <rect x="27" y="44" width="14" height="2.5" fill="#2a1a05"/>
      <rect x="27" y="44" width="14" height="0.4" fill="#5a3a18"/>
      <!-- gold belt buckle -->
      <rect x="32" y="44.5" width="4" height="1.7" fill="#ffd700"/>
      <rect x="32" y="44.5" width="4" height="0.5" fill="#fff4a0"/>
      <!-- robe trim at bottom (gold thread) -->
      <rect x="24" y="57" width="20" height="0.6" fill="#ffd700"/>
      <!-- mystical sigil on chest -->
      <circle cx="34" cy="38" r="2" fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.7"/>
      <polygon points="34,36.5 35,38 34,39.5 33,38" fill="#ffd700" opacity="0.8"/>
      <!-- robe sleeve right (back arm) -->
      <polygon points="40,30 44,32 44,42 40,40" fill="#3a2a6a"/>
      <polygon points="40,30 43,32 43,40" fill="#4a3a7a"/>
    </g>

    <!-- BACK ARM (tucked at side) -->
    <g>
      <rect x="40" y="38" width="3.5" height="8" fill="#3a2a6a"/>
      <rect x="40" y="38" width="0.7" height="8" fill="#2a1a5a"/>
      <circle cx="41.7" cy="46" r="1.6" fill="#d89868"/>
      <circle cx="41.7" cy="45.5" r="0.6" fill="#e8b88a"/>
    </g>

    <!-- HEAD (profile, facing LEFT) -->
    <g>
      <!-- skin base -->
      <circle cx="32" cy="20" r="5.5" fill="#e8b88a"/>
      <!-- jaw shadow -->
      <ellipse cx="32" cy="22" rx="5" ry="3" fill="#d89868" opacity="0.5"/>
      <!-- prominent nose (LEFT) -->
      <polygon points="27,19 22,21 27,23" fill="#e8b88a"/>
      <polygon points="27,19 24,21 27,22.5" fill="#d89868"/>
      <!-- bushy eyebrow -->
      <ellipse cx="29" cy="16" rx="2" ry="0.7" fill="#e8e8e8"/>
      <!-- eye (focused, intense gaze on spell) -->
      <ellipse cx="28.5" cy="18" rx="1.2" ry="0.8" fill="#ffffff"/>
      <circle cx="28.2" cy="18" r="0.6" fill="#1a4a7a"/>
      <circle cx="28.1" cy="17.8" r="0.2" fill="#ffffff"/>
      <!-- ear -->
      <ellipse cx="36" cy="20" rx="0.9" ry="1.4" fill="#d89868"/>

      <!-- BEARD (long, flowing) -->
      <g>
        <animateTransform attributeName="transform" type="rotate"
                          values="0 32 22; -1 32 22; -2 32 22; -3 32 22; -3 32 22; 4 32 22; 6 32 22; 5 32 22; 3 32 22; 1 32 22; 0 32 22; 0 32 22"
                          dur="1.2s" repeatCount="indefinite"/>
        <!-- main beard body -->
        <polygon points="24,22 33,22 33,36 28,38 23,30" fill="#ffffff"/>
        <polygon points="24,22 31,22 30,32 26,30" fill="#e8e8e8"/>
        <!-- beard depth/shadow -->
        <polygon points="29,22 33,22 33,36 30,36" fill="#d8d8d8"/>
        <!-- beard strand details -->
        <line x1="26" y1="28" x2="25" y2="34" stroke="#c0c0c0" stroke-width="0.3"/>
        <line x1="28" y1="28" x2="27" y2="36" stroke="#c0c0c0" stroke-width="0.3"/>
        <line x1="30" y1="28" x2="30" y2="36" stroke="#c0c0c0" stroke-width="0.3"/>
        <!-- mustache -->
        <polygon points="24,21 28,21 26,23" fill="#ffffff"/>
        <polygon points="29,21 33,21 31,23" fill="#ffffff"/>
      </g>

      <!-- WIZARD HAT (tilts subtly with motion) -->
      <g>
        <animateTransform attributeName="transform" type="rotate"
                          values="0 32 14; -1 32 14; -2 32 14; -3 32 14; -3 32 14; 3 32 14; 5 32 14; 4 32 14; 2 32 14; 1 32 14; 0 32 14; 0 32 14"
                          dur="1.2s" repeatCount="indefinite"/>
        <!-- hat brim -->
        <rect x="25" y="13" width="14" height="2" fill="#2a1a5a"/>
        <rect x="25" y="14.5" width="14" height="0.5" fill="#3a2a6a"/>
        <!-- hat cone -->
        <polygon points="26,13 39,13 22,0" fill="#3a2a6a"/>
        <polygon points="26,13 35,13 22,0" fill="#4a3a7a"/>
        <!-- hat shadow side -->
        <polygon points="35,13 39,13 30,5" fill="#2a1a5a"/>
        <!-- gold trim on hat -->
        <rect x="25" y="13" width="14" height="0.6" fill="#ffd700"/>
        <!-- crescent moon emblem -->
        <path d="M 30,7 A 2,2 0 1 1 30,11 A 1.5,1.5 0 1 0 30,7 Z" fill="#ffd700"/>
        <!-- stars on hat -->
        <polygon points="33,10 33.5,11 34.5,11 33.7,11.7 34,12.7 33,12 32,12.7 32.3,11.7 31.5,11 32.5,11" fill="#ffd700"/>
        <polygon points="28,11.5 28.3,12 28.8,12 28.4,12.4 28.6,13 28,12.7 27.4,13 27.6,12.4 27.2,12 27.7,12" fill="#fff4a0"/>
      </g>
    </g>

    <!-- FRONT ARM (with staff — animates from rest to thrust forward) -->
    <g transform="translate(30, 32)">
      <animateTransform attributeName="transform" type="rotate"
                        values="-35; -30; -25; -20; -15; -90; -120; -110; -90; -65; -45; -35"
                        dur="1.2s" repeatCount="indefinite" additive="sum"/>
      <!-- upper arm (in sleeve) -->
      <rect x="-2.2" y="0" width="4.4" height="8" fill="#3a2a6a"/>
      <rect x="-2.2" y="0" width="1" height="8" fill="#2a1a5a"/>
      <!-- sleeve cuff -->
      <rect x="-2.5" y="7" width="5" height="1.5" fill="#ffd700"/>
      <!-- forearm/hand -->
      <g transform="translate(0, 8)">
        <animateTransform attributeName="transform" type="rotate"
                          values="0; 0; -5; -10; -15; 0; 10; 5; 0; -5; -5; 0"
                          dur="1.2s" repeatCount="indefinite" additive="sum"/>
        <rect x="-1.8" y="0" width="3.6" height="6" fill="#3a2a6a"/>
        <rect x="-1.8" y="0" width="0.8" height="6" fill="#2a1a5a"/>
        <!-- hand gripping staff -->
        <circle cx="0" cy="7" r="1.8" fill="#d89868"/>
        <circle cx="-0.3" cy="6.7" r="0.7" fill="#e8b88a"/>

        <!-- STAFF extends from hand both directions -->
        <!-- staff shaft going UP (toward orb at top) -->
        <rect x="-1.2" y="-25" width="2.4" height="32" fill="#6b4423"/>
        <rect x="-1.2" y="-25" width="2.4" height="2" fill="#4a2a11"/>
        <rect x="-1.2" y="-25" width="0.8" height="32" fill="#4a2a11"/>
        <rect x="0.5" y="-25" width="0.5" height="32" fill="#8b5a33"/>
        <!-- staff binding (decorative wraps) -->
        <rect x="-1.5" y="-5" width="3" height="1" fill="#3a2a18"/>
        <rect x="-1.5" y="-1" width="3" height="1" fill="#3a2a18"/>
        <!-- ORB at top of staff with magic -->
        <g>
          <!-- outer glow (pulses with cast intensity) -->
          <circle cx="0" cy="-28" r="6" fill="#00ccff" opacity="0.3">
            <animate attributeName="r" values="5;5.5;6;6.5;7;9;8;7;6;5.5;5;5" dur="1.2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.25;0.3;0.35;0.4;0.5;0.7;0.5;0.4;0.35;0.3;0.25;0.25" dur="1.2s" repeatCount="indefinite"/>
          </circle>
          <!-- mid glow -->
          <circle cx="0" cy="-28" r="4" fill="#66eeff" opacity="0.7">
            <animate attributeName="r" values="3;3.5;4;4.5;5;6;5;4.5;4;3.5;3;3" dur="1.2s" repeatCount="indefinite"/>
          </circle>
          <!-- inner orb -->
          <circle cx="0" cy="-28" r="2.5" fill="#aaeeff"/>
          <!-- white-hot core (pulses brighter at cast) -->
          <circle cx="0" cy="-28" r="1.2" fill="#ffffff">
            <animate attributeName="r" values="1;1.2;1.4;1.6;1.8;2.5;2;1.6;1.4;1.2;1;1" dur="1.2s" repeatCount="indefinite"/>
          </circle>
          <!-- orb claw cradle (dark structure holding orb) -->
          <path d="M -2.5,-26 Q 0,-22 2.5,-26" fill="none" stroke="#3a2a18" stroke-width="1"/>
          <path d="M -2.5,-30 Q 0,-32 2.5,-30" fill="none" stroke="#3a2a18" stroke-width="0.7" opacity="0.7"/>
        </g>
      </g>
    </g>

    <!-- SLEEVE billow on cast moment (between arm transitions) -->
    <g>
      <animate attributeName="opacity" values="0;0;0;0;0;0.7;1;0.8;0.4;0;0;0" dur="1.2s" repeatCount="indefinite"/>
      <polygon points="28,32 24,40 26,42 30,36" fill="#3a2a6a"/>
      <polygon points="28,32 25,38 27,40 30,34" fill="#4a3a7a"/>
    </g>
  </g>

  <!-- SPELL EFFECT particles (intensify on cast) -->
  <g>
    <!-- magic sparks orbiting the orb area, intensify during cast -->
    <circle r="1.4" fill="#aaeeff">
      <animate attributeName="cx" values="18;16;18;20;18;14;10;8;12;16;18;18" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="14;10;14;18;14;6;4;6;10;14;14;14" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.6;0.4;0.6;0.8;1;0.9;0.7;0.5;0.4;0.4;0.4" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="0.8;0.9;0.8;1;1.2;1.6;1.4;1.2;1;0.8;0.8;0.8" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="1" fill="#ffffff">
      <animate attributeName="cx" values="20;22;20;18;20;10;6;8;14;18;20;20" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="12;8;12;16;12;2;0;4;8;12;12;12" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.7;0.4;0.7;0.9;1;0.8;0.6;0.5;0.4;0.4;0.4" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="0.7" fill="#66eeff">
      <animate attributeName="cx" values="16;18;16;14;16;12;6;4;8;14;16;16" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="16;12;16;20;16;8;4;6;12;16;16;16" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3;0.6;0.8;1;0.9;0.6;0.4;0.3;0.3;0.3" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- CAST BURST (explosive flash at the moment of casting — visible briefly mid-cycle) -->
  <g>
    <animate attributeName="opacity" values="0;0;0;0;0;0.9;1;0.6;0.2;0;0;0" dur="1.2s" repeatCount="indefinite"/>
    <circle cx="8" cy="4" r="6" fill="#aaeeff" opacity="0.6"/>
    <circle cx="8" cy="4" r="3.5" fill="#ffffff"/>
    <!-- burst rays -->
    <polygon points="8,4 -2,2 0,4 -2,6" fill="#aaeeff" opacity="0.7"/>
    <polygon points="8,4 2,-4 4,2 -2,0" fill="#aaeeff" opacity="0.5"/>
    <polygon points="8,4 12,-4 8,2 4,-2" fill="#aaeeff" opacity="0.6"/>
  </g>

  <!-- TRAILING ENERGY (continues forward from cast point — depicts spell traveling) -->
  <g>
    <animate attributeName="opacity" values="0;0;0;0;0;0;0.8;1;0.6;0.2;0;0" dur="1.2s" repeatCount="indefinite"/>
    <ellipse cx="2" cy="6" rx="3" ry="1" fill="#aaeeff">
      <animate attributeName="cx" values="6;4;2;0;-2;-4" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.9;0.7;0.5;0.2" dur="1.2s" repeatCount="indefinite"/>
    </ellipse>
    <circle cx="2" cy="6" r="1.5" fill="#ffffff">
      <animate attributeName="cx" values="6;4;2;0;-2;-4" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
