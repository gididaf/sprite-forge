<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ground shadow -->
  <ellipse cx="32" cy="60" rx="12" ry="1.8" fill="#000000" opacity="0.28">
    <animate attributeName="rx" values="12;12;12.5;13;13.5;13.5;13;12;11.5;11;11;11.5;12;12" dur="0.7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Body lean group: back during wind-up, forward during strike, recover -->
  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="0,0; 0.2,0; 0.6,-0.2; 1,-0.3; 1.2,-0.4; 1.2,-0.3; 0.5,0; -0.8,0.3; -1.5,0.5; -1.4,0.4; -1,0.2; -0.4,0.1; 0,0; 0,0"
                      dur="0.7s" repeatCount="indefinite"/>

    <!-- BACK LEG (planted back foot) -->
    <g transform="translate(36, 44)">
      <rect x="-2.5" y="0" width="5" height="14" fill="#5a6a80"/>
      <rect x="-2.5" y="0" width="1" height="14" fill="#3a4a60"/>
      <rect x="-2.5" y="6" width="5" height="2" fill="#4a5a70"/>
      <rect x="-3.5" y="13" width="7" height="3" fill="#1a1a1a"/>
      <rect x="-3.5" y="13" width="7" height="0.5" fill="#3a3a3a"/>
    </g>

    <!-- FRONT LEG (forward stance) -->
    <g transform="translate(28, 44)">
      <rect x="-2.5" y="0" width="5" height="14" fill="#6a7a90"/>
      <rect x="-2.5" y="0" width="1" height="14" fill="#4a5a70"/>
      <rect x="-2.5" y="6" width="5" height="2" fill="#5a6a80"/>
      <rect x="-3.5" y="13" width="7" height="3" fill="#1a1a1a"/>
      <rect x="-3.5" y="13" width="7" height="0.5" fill="#3a3a3a"/>
    </g>

    <!-- BACK ARM with SHIELD (raises slightly during wind-up) -->
    <g transform="translate(37, 27)">
      <animateTransform attributeName="transform" type="rotate"
                        values="-10; -15; -20; -25; -28; -28; -10; 10; 15; 12; 8; 0; -5; -8"
                        dur="0.7s" repeatCount="indefinite" additive="sum"/>
      <!-- upper arm -->
      <rect x="-2" y="0" width="4" height="9" fill="#5a6a80"/>
      <rect x="-2" y="0" width="1" height="9" fill="#3a4a60"/>
      <!-- forearm + shield grip -->
      <g transform="translate(0, 9)">
        <rect x="-1.8" y="0" width="3.6" height="6" fill="#5a6a80"/>
        <rect x="-1.8" y="0" width="1" height="6" fill="#3a4a60"/>
        <!-- KITE SHIELD attached -->
        <path d="M -7,-4 L 7,-4 L 7,3 Q 0,12 -7,3 Z" fill="#6a7a90"/>
        <path d="M -7,-4 L 7,-4 L 7,3 Q 0,12 -7,3 Z" fill="none" stroke="#2a3a50" stroke-width="0.8"/>
        <!-- shield highlight -->
        <path d="M -6,-3 L 6,-3 L 6,2" fill="none" stroke="#9aaabc" stroke-width="0.6"/>
        <!-- shield cross emblem -->
        <rect x="-1" y="-3" width="2" height="11" fill="#cc2222"/>
        <rect x="-4" y="-1" width="8" height="2" fill="#cc2222"/>
        <!-- emblem highlight -->
        <rect x="-0.5" y="-3" width="0.7" height="11" fill="#ee3333"/>
        <rect x="-4" y="-0.7" width="8" height="0.7" fill="#ee3333"/>
      </g>
    </g>

    <!-- TORSO (chestplate) -->
    <g>
      <!-- plate body -->
      <rect x="26" y="24" width="12" height="18" fill="#6a7a90"/>
      <rect x="26" y="24" width="12" height="3" fill="#9aaabc"/>
      <rect x="26" y="24" width="2" height="18" fill="#5a6a80"/>
      <rect x="36" y="24" width="2" height="18" fill="#8a9aac"/>
      <!-- pauldron (shoulder plate) -->
      <ellipse cx="28" cy="25" rx="3" ry="2.5" fill="#7a8aa0"/>
      <ellipse cx="28" cy="24.5" rx="2.5" ry="1" fill="#9aaabc"/>
      <!-- breastplate ridge -->
      <polygon points="30,28 34,28 32,33" fill="#8a9aac"/>
      <polygon points="31,29 33,29 32,32" fill="#aabad0"/>
      <!-- belt -->
      <rect x="26" y="40" width="12" height="2.5" fill="#3a2a18"/>
      <rect x="26" y="40" width="12" height="0.5" fill="#5a3a18"/>
      <rect x="30" y="40.5" width="4" height="1.5" fill="#b89248"/>
      <!-- chest emblem -->
      <polygon points="30,32 34,32 32,38" fill="#cc2222"/>
      <polygon points="31,33 33,33 32,37" fill="#ee3333"/>
    </g>

    <!-- HEAD/HELMET (profile facing LEFT) -->
    <g>
      <!-- helmet base -->
      <rect x="26" y="12" width="12" height="11" fill="#7a8aa0"/>
      <rect x="26" y="12" width="12" height="3" fill="#9aaabc"/>
      <rect x="26" y="20" width="12" height="3" fill="#5a6a80"/>
      <!-- helmet front shape (slight protrusion forward) -->
      <polygon points="26,14 24,16 24,21 26,22" fill="#6a7a90"/>
      <!-- visor slit -->
      <rect x="23" y="17" width="6" height="1.5" fill="#0a0a0a"/>
      <!-- eye glow inside slit -->
      <circle cx="26" cy="17.7" r="0.5" fill="#ffaa44">
        <animate attributeName="opacity" values="0.9;1;0.9;1;0.9" dur="0.7s" repeatCount="indefinite"/>
      </circle>
      <!-- helmet chin guard -->
      <polygon points="26,22 24,22 28,24" fill="#5a6a80"/>
      <!-- helmet top rivets -->
      <circle cx="29" cy="13.5" r="0.5" fill="#3a4a60"/>
      <circle cx="35" cy="13.5" r="0.5" fill="#3a4a60"/>
      <!-- PLUME (red horsehair, bobs with attack motion) -->
      <g transform="translate(32, 12)">
        <animateTransform attributeName="transform" type="rotate"
                          values="0; 2; 4; 6; 8; 8; 4; -4; -8; -10; -8; -4; -2; 0"
                          dur="0.7s" repeatCount="indefinite" additive="sum"/>
        <polygon points="-3,0 -1,-7 1,-7 3,0" fill="#cc2222"/>
        <polygon points="-2,-1 -1,-7 1,-7 2,-1" fill="#ee3333"/>
        <polygon points="-1,-2 -0.5,-7 0.5,-7 1,-2" fill="#ff5544"/>
        <!-- plume strands -->
        <line x1="-2" y1="-1" x2="-3" y2="-6" stroke="#8a1010" stroke-width="0.4"/>
        <line x1="2" y1="-1" x2="3" y2="-6" stroke="#8a1010" stroke-width="0.4"/>
      </g>
    </g>

    <!-- FRONT ARM with SWORD (the swinging arm) -->
    <g transform="translate(28, 27)">
      <animateTransform attributeName="transform" type="rotate"
                        values="0; 10; 60; 130; 175; 195; 220; 250; 270; 295; 320; 345; 360; 360"
                        dur="0.7s" repeatCount="indefinite" additive="sum"/>
      <!-- upper arm + forearm -->
      <rect x="-2" y="0" width="4" height="9" fill="#5a6a80"/>
      <rect x="-2" y="0" width="1" height="9" fill="#3a4a60"/>
      <!-- gauntlet hand -->
      <rect x="-2.5" y="9" width="5" height="3" fill="#4a5a70"/>
      <rect x="-2.5" y="9" width="5" height="0.5" fill="#7a8aa0"/>
      <!-- pommel -->
      <circle cx="0" cy="13" r="1.6" fill="#b89248"/>
      <circle cx="0" cy="13" r="0.8" fill="#d4a850"/>
      <!-- grip -->
      <rect x="-1" y="14" width="2" height="3" fill="#3a2a18"/>
      <!-- cross-guard -->
      <rect x="-5" y="17" width="10" height="2" fill="#b89248"/>
      <rect x="-5" y="17" width="10" height="0.5" fill="#d4a850"/>
      <circle cx="-5" cy="18" r="1" fill="#d4a850"/>
      <circle cx="5" cy="18" r="1" fill="#d4a850"/>
      <!-- blade -->
      <polygon points="-1.5,19 1.5,19 1.5,38 0,41 -1.5,38" fill="#d8d8d8"/>
      <rect x="-0.3" y="19" width="0.6" height="19" fill="#ffffff"/>
      <!-- blade edge highlight -->
      <line x1="-1.5" y1="19" x2="-1.5" y2="38" stroke="#a8a8a8" stroke-width="0.4"/>
      <line x1="1.5" y1="19" x2="1.5" y2="38" stroke="#a8a8a8" stroke-width="0.4"/>
    </g>
  </g>

  <!-- SWORD SWOOSH TRAIL (visible during strike — arcing white smear) -->
  <g>
    <animate attributeName="opacity"
             values="0; 0; 0; 0; 0; 0; 0.4; 0.9; 1; 0.7; 0.3; 0; 0; 0"
             dur="0.7s" repeatCount="indefinite"/>
    <path d="M 8,12 Q -2,28 10,46" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 6,14 Q -4,28 8,44" stroke="#fff8cc" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- spark/impact flash at strike -->
    <circle cx="-2" cy="28" r="3" fill="#ffffff" opacity="0.6"/>
    <circle cx="-2" cy="28" r="1.5" fill="#fff8cc"/>
  </g>
</svg>
