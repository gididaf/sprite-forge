<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ground shadow -->
  <ellipse cx="32" cy="60" rx="11" ry="1.8" fill="#000000" opacity="0.22">
    <animate attributeName="rx" values="11;11.5;11;10.5;11;11.5;11;10.5" dur="0.6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Body bob group (NOT the whole svg — shadow stays put) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
                      values="0,-1; 0,0; 0,-1; 0,-1.5; 0,-1; 0,0; 0,-1; 0,-1.5"
                      dur="0.6s" repeatCount="indefinite"/>

    <!-- BACK LEG (2-segment with knee, phase-offset from front) -->
    <g transform="translate(34, 40)">
      <animateTransform attributeName="transform" type="rotate"
                        values="-20; -15; -5; 10; 25; 20; 5; -10"
                        dur="0.6s" repeatCount="indefinite" additive="sum"/>
      <!-- upper bone (femur) -->
      <rect x="-2" y="0" width="4" height="8" fill="#c0b8a8"/>
      <rect x="-2" y="0" width="0.7" height="8" fill="#9a9080"/>
      <!-- knee joint -->
      <circle cx="0" cy="8" r="1.5" fill="#d8d0c0"/>
      <!-- lower bone (tibia) -->
      <g transform="translate(0, 8)">
        <animateTransform attributeName="transform" type="rotate"
                          values="0; -15; -30; -10; 0; -15; -30; -10"
                          dur="0.6s" repeatCount="indefinite" additive="sum"/>
        <rect x="-1.8" y="0" width="3.6" height="8" fill="#c0b8a8"/>
        <rect x="-1.8" y="0" width="0.6" height="8" fill="#9a9080"/>
        <!-- foot -->
        <rect x="-2.5" y="7" width="6" height="2.5" fill="#b8b0a0"/>
        <rect x="-2.5" y="7" width="6" height="0.5" fill="#d8d0c0"/>
        <!-- toe bones -->
        <rect x="-2.5" y="9" width="1.5" height="1" fill="#9a9080"/>
        <rect x="-0.5" y="9" width="1.5" height="1" fill="#9a9080"/>
        <rect x="1.5" y="9" width="1.5" height="1" fill="#9a9080"/>
      </g>
    </g>

    <!-- BACK ARM with SWORD (counter-phase) -->
    <g transform="translate(35, 24)">
      <animateTransform attributeName="transform" type="rotate"
                        values="20; 5; -5; -15; -20; -5; 10; 20"
                        dur="0.6s" repeatCount="indefinite" additive="sum"/>
      <!-- upper arm (humerus) -->
      <rect x="-1.6" y="0" width="3.2" height="7" fill="#c0b8a8"/>
      <rect x="-1.6" y="0" width="0.6" height="7" fill="#9a9080"/>
      <!-- elbow -->
      <circle cx="0" cy="7" r="1.3" fill="#d8d0c0"/>
      <!-- forearm + sword -->
      <g transform="translate(0, 7)">
        <animateTransform attributeName="transform" type="rotate"
                          values="-15; -10; 0; 5; 0; -5; -10; -15"
                          dur="0.6s" repeatCount="indefinite" additive="sum"/>
        <rect x="-1.5" y="0" width="3" height="6" fill="#c0b8a8"/>
        <rect x="-1.5" y="0" width="0.5" height="6" fill="#9a9080"/>
        <!-- bony hand -->
        <circle cx="0" cy="6.5" r="1.5" fill="#d8d0c0"/>
        <!-- sword grip -->
        <rect x="-0.8" y="7" width="1.6" height="3" fill="#3a2a18"/>
        <rect x="-0.8" y="7" width="1.6" height="0.5" fill="#5a3a18"/>
        <!-- cross-guard (rusty brass) -->
        <rect x="-4" y="10" width="8" height="1.8" fill="#7a6020"/>
        <rect x="-4" y="10" width="8" height="0.5" fill="#9a8030"/>
        <!-- blade (rusty/aged) -->
        <polygon points="-1.4,11.8 1.4,11.8 1.4,28 0,30.5 -1.4,28" fill="#b8b0a0"/>
        <rect x="-0.3" y="11.8" width="0.6" height="16" fill="#d8d0c0"/>
        <!-- rust spots -->
        <circle cx="0" cy="16" r="0.5" fill="#7a5530"/>
        <circle cx="-0.5" cy="22" r="0.3" fill="#7a5530"/>
      </g>
    </g>

    <!-- TORSO / RIBCAGE -->
    <g>
      <!-- main rib body -->
      <rect x="28" y="22" width="8" height="18" fill="#e8e0d0"/>
      <!-- spine outline (down center) -->
      <line x1="32" y1="22" x2="32" y2="40" stroke="#9a9080" stroke-width="0.7"/>
      <!-- rib lines (curved-looking) -->
      <path d="M 28,25 Q 32,24 36,25" stroke="#8a8070" stroke-width="0.7" fill="none"/>
      <path d="M 28,28 Q 32,27 36,28" stroke="#8a8070" stroke-width="0.7" fill="none"/>
      <path d="M 28,31 Q 32,30 36,31" stroke="#8a8070" stroke-width="0.7" fill="none"/>
      <path d="M 28,34 Q 32,33 36,34" stroke="#8a8070" stroke-width="0.7" fill="none"/>
      <!-- sternum -->
      <rect x="31.5" y="23" width="1" height="13" fill="#d8d0c0"/>
      <!-- shadow under ribs (gives depth) -->
      <rect x="28" y="22" width="1" height="18" fill="#c0b8a8"/>
      <rect x="35" y="22" width="1" height="18" fill="#c0b8a8"/>
      <!-- pelvis -->
      <polygon points="27,40 37,40 36,44 28,44" fill="#d8d0c0"/>
      <polygon points="27,40 37,40 36.5,41 27.5,41" fill="#c0b8a8"/>
      <ellipse cx="32" cy="42" rx="2" ry="1.2" fill="#1a1a1a" opacity="0.6"/>
      <!-- belt -->
      <rect x="27" y="39" width="10" height="2" fill="#3a2a18"/>
      <rect x="30" y="39.3" width="4" height="1.4" fill="#7a6020"/>
    </g>

    <!-- HEAD/SKULL (profile facing LEFT, slight nodding with steps) -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
                        values="0 31 18; -2 31 18; 0 31 18; 1 31 18; 0 31 18; -2 31 18; 0 31 18; 1 31 18"
                        dur="0.6s" repeatCount="indefinite"/>
      <!-- skull main shape -->
      <ellipse cx="31" cy="15" rx="7" ry="6.5" fill="#f0ead6"/>
      <ellipse cx="31" cy="13" rx="5" ry="3" fill="#fff5e0"/>
      <!-- snout (snout extends LEFT) -->
      <rect x="23" y="15" width="5" height="6" fill="#f0ead6"/>
      <rect x="23" y="15" width="0.5" height="6" fill="#c0b8a8"/>
      <!-- jaw line (animated subtle open) -->
      <rect x="22" y="19.5" width="6" height="0.8" fill="#9a9080">
        <animate attributeName="y" values="19.5;20;19.5;19.5;19.5;20;19.5;19.5" dur="0.6s" repeatCount="indefinite"/>
      </rect>
      <!-- eye socket (deep black with glowing red iris) -->
      <ellipse cx="26" cy="14" rx="2" ry="2.4" fill="#000000"/>
      <circle cx="26" cy="14" r="0.9" fill="#ff2222">
        <animate attributeName="opacity" values="0.8;1;0.9;1;0.8;1;0.9;1" dur="0.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="26" cy="14" r="0.4" fill="#ff8866"/>
      <!-- nose hole (triangular skull nose) -->
      <polygon points="24,16 26,16 25,18.5" fill="#0a0a0a"/>
      <!-- teeth (visible in profile) -->
      <line x1="23" y1="20.3" x2="28" y2="20.3" stroke="#000000" stroke-width="0.5"/>
      <line x1="23.5" y1="19.5" x2="23.5" y2="21" stroke="#000000" stroke-width="0.3"/>
      <line x1="24.8" y1="19.5" x2="24.8" y2="21" stroke="#000000" stroke-width="0.3"/>
      <line x1="26" y1="19.5" x2="26" y2="21" stroke="#000000" stroke-width="0.3"/>
      <line x1="27.2" y1="19.5" x2="27.2" y2="21" stroke="#000000" stroke-width="0.3"/>
      <!-- cracks on skull -->
      <line x1="33" y1="11" x2="35" y2="14" stroke="#a89888" stroke-width="0.4"/>
      <line x1="32" y1="10" x2="33" y2="13" stroke="#a89888" stroke-width="0.3"/>
      <!-- moss/age patches -->
      <ellipse cx="34" cy="12" rx="1.5" ry="0.8" fill="#3a5a2a" opacity="0.4"/>
      <ellipse cx="29" cy="11" rx="0.8" ry="0.5" fill="#3a5a2a" opacity="0.3"/>
    </g>

    <!-- FRONT LEG (2-segment) -->
    <g transform="translate(30, 40)">
      <animateTransform attributeName="transform" type="rotate"
                        values="25; 20; 5; -10; -20; -15; -5; 10"
                        dur="0.6s" repeatCount="indefinite" additive="sum"/>
      <rect x="-2" y="0" width="4" height="8" fill="#e8e0d0"/>
      <rect x="-2" y="0" width="0.7" height="8" fill="#b8b0a0"/>
      <circle cx="0" cy="8" r="1.6" fill="#f0e8d8"/>
      <g transform="translate(0, 8)">
        <animateTransform attributeName="transform" type="rotate"
                          values="0; -15; -30; -10; 0; -15; -30; -10"
                          dur="0.6s" repeatCount="indefinite" additive="sum"/>
        <rect x="-1.8" y="0" width="3.6" height="8" fill="#e8e0d0"/>
        <rect x="-1.8" y="0" width="0.6" height="8" fill="#b8b0a0"/>
        <rect x="-2.5" y="7" width="6" height="2.5" fill="#d8d0c0"/>
        <rect x="-2.5" y="7" width="6" height="0.5" fill="#f0e8d8"/>
        <!-- toe bones -->
        <rect x="-2.5" y="9" width="1.5" height="1" fill="#9a9080"/>
        <rect x="-0.5" y="9" width="1.5" height="1" fill="#9a9080"/>
        <rect x="1.5" y="9" width="1.5" height="1" fill="#9a9080"/>
      </g>
    </g>

    <!-- FRONT ARM with SHIELD -->
    <g transform="translate(29, 24)">
      <animateTransform attributeName="transform" type="rotate"
                        values="-20; -5; 10; 20; 20; 5; -5; -15"
                        dur="0.6s" repeatCount="indefinite" additive="sum"/>
      <!-- upper arm -->
      <rect x="-1.6" y="0" width="3.2" height="6" fill="#e8e0d0"/>
      <rect x="-1.6" y="0" width="0.6" height="6" fill="#b8b0a0"/>
      <!-- elbow -->
      <circle cx="0" cy="6" r="1.3" fill="#f0e8d8"/>
      <!-- forearm + shield -->
      <g transform="translate(0, 6)">
        <rect x="-1.5" y="0" width="3" height="5" fill="#e8e0d0"/>
        <rect x="-1.5" y="0" width="0.5" height="5" fill="#b8b0a0"/>
        <!-- ROUND wooden shield -->
        <circle cx="-3" cy="5" r="5.5" fill="#5a3a18"/>
        <circle cx="-3" cy="5" r="5" fill="#7a5530"/>
        <circle cx="-3" cy="5" r="3.5" fill="#5a3a18"/>
        <circle cx="-3" cy="5" r="3" fill="#7a5530"/>
        <!-- iron boss center -->
        <circle cx="-3" cy="5" r="1.5" fill="#3a3a3a"/>
        <circle cx="-3" cy="5" r="0.7" fill="#1a1a1a"/>
        <!-- shield rim -->
        <circle cx="-3" cy="5" r="5.5" fill="none" stroke="#3a2a18" stroke-width="0.6"/>
        <!-- decorative cross -->
        <line x1="-3" y1="-0.5" x2="-3" y2="10.5" stroke="#3a2a18" stroke-width="0.5"/>
        <line x1="-8.5" y1="5" x2="2.5" y2="5" stroke="#3a2a18" stroke-width="0.5"/>
        <!-- chip/damage on rim -->
        <polygon points="-7.5,7 -6.5,8.5 -8,9" fill="#3a2a18"/>
      </g>
    </g>
  </g>

  <!-- Spectral wisps (subtle, around the warrior — gives ghostly feel) -->
  <g opacity="0.3">
    <circle cx="40" cy="30" r="1" fill="#aaffcc">
      <animate attributeName="cy" values="30;22;14;30" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="22" cy="35" r="0.8" fill="#aaffcc">
      <animate attributeName="cy" values="35;28;18;35" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
