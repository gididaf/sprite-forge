<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <animateTransform attributeName="transform" type="translate" values="0,0; 0,-1; 0,0" dur="0.6s" repeatCount="indefinite"/>
  <ellipse cx="32" cy="60" rx="11" ry="1.8" fill="rgba(0,0,0,0.2)"/>

  <!-- BACK LEG (darker, hip slightly right) -->
  <g transform="translate(34,42)">
    <animateTransform attributeName="transform" type="rotate" values="25 0 0; -25 0 0; 25 0 0" dur="0.6s" repeatCount="indefinite" additive="sum"/>
    <rect x="-2.5" y="0" width="5" height="16" fill="#b8b0a0"/>
    <rect x="-4" y="15" width="7" height="3" fill="#555"/>
  </g>

  <!-- BACK ARM (starts back, opposite to back leg) - holds sword straight up-and-out -->
  <g transform="translate(35,24)">
    <animateTransform attributeName="transform" type="rotate" values="-30 0 0; 30 0 0; -30 0 0" dur="0.6s" repeatCount="indefinite" additive="sum"/>
    <rect x="-2" y="0" width="4" height="13" fill="#b8b0a0"/>
    <!-- hand -->
    <circle cx="0" cy="13" r="2" fill="#e0dcc8"/>
    <!-- sword: grip + crossguard + blade (all along arm axis, extending past the hand) -->
    <rect x="-1" y="12" width="2" height="3" fill="#5a3a1a"/>
    <rect x="-5" y="14.5" width="10" height="2" fill="#998866"/>
    <rect x="-1.5" y="16" width="3" height="18" fill="#d8d4c8"/>
    <polygon points="-1.5,34 1.5,34 0,37" fill="#d8d4c8"/>
  </g>

  <!-- RIBCAGE / TORSO -->
  <rect x="28" y="22" width="8" height="18" fill="#e8e0d0"/>
  <line x1="28" y1="25" x2="36" y2="25" stroke="#a89888" stroke-width="1"/>
  <line x1="28" y1="28" x2="36" y2="28" stroke="#a89888" stroke-width="1"/>
  <line x1="28" y1="31" x2="36" y2="31" stroke="#a89888" stroke-width="1"/>
  <line x1="28" y1="34" x2="36" y2="34" stroke="#a89888" stroke-width="1"/>
  <line x1="32" y1="22" x2="32" y2="40" stroke="#a89888" stroke-width="1"/>
  <rect x="27" y="39" width="10" height="4" fill="#d8d0c0"/>

  <!-- SKULL (profile, facing LEFT) -->
  <ellipse cx="31" cy="15" rx="7" ry="6" fill="#f0ead6"/>
  <rect x="23" y="15" width="4" height="5" fill="#f0ead6"/>
  <rect x="23" y="18" width="4" height="1" fill="#8a7a6a"/>
  <ellipse cx="26" cy="14" rx="1.8" ry="2.2" fill="#000"/>
  <circle cx="26" cy="14" r="0.6" fill="#ff3333"/>
  <polygon points="23,15 25,15 24,18" fill="#000"/>
  <line x1="23" y1="20" x2="27" y2="20" stroke="#000" stroke-width="0.5"/>
  <line x1="24" y1="19" x2="24" y2="21" stroke="#000" stroke-width="0.3"/>
  <line x1="25.5" y1="19" x2="25.5" y2="21" stroke="#000" stroke-width="0.3"/>

  <!-- FRONT LEG (lighter, hip slightly left) -->
  <g transform="translate(30,42)">
    <animateTransform attributeName="transform" type="rotate" values="-25 0 0; 25 0 0; -25 0 0" dur="0.6s" repeatCount="indefinite" additive="sum"/>
    <rect x="-2.5" y="0" width="5" height="16" fill="#e8e0d0"/>
    <rect x="-4" y="15" width="7" height="3" fill="#777"/>
  </g>

  <!-- FRONT ARM (shield, opposite phase) -->
  <g transform="translate(29,24)">
    <animateTransform attributeName="transform" type="rotate" values="30 0 0; -30 0 0; 30 0 0" dur="0.6s" repeatCount="indefinite" additive="sum"/>
    <rect x="-2" y="0" width="4" height="12" fill="#e8e0d0"/>
    <circle cx="-3" cy="10" r="5" fill="#8b4513"/>
    <circle cx="-3" cy="10" r="3.5" fill="#a0522d"/>
    <circle cx="-3" cy="10" r="1" fill="#d4a373"/>
  </g>
</svg>
