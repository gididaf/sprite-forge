<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64">
  <!-- body rises on downstroke -->
  <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0; 0,2; 0,0" dur="0.7s" repeatCount="indefinite"/>
  <ellipse cx="40" cy="60" rx="14" ry="2" fill="rgba(0,0,0,0.2)">
    <animate attributeName="rx" values="14;9;14;16;14" dur="0.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.1;0.2;0.3;0.2" dur="0.7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- BACK WING (far side, darker) - full down/up stroke -->
  <g transform="translate(44,28)">
    <animateTransform attributeName="transform" type="rotate" values="-60 0 0; 40 0 0; -60 0 0" dur="0.7s" repeatCount="indefinite" additive="sum"/>
    <path d="M 0,0 Q 14,-10 22,-2 Q 18,6 0,4 Z" fill="#7a1a1a"/>
    <!-- wing membrane lines -->
    <line x1="2" y1="2" x2="18" y2="-4" stroke="#5a1010" stroke-width="0.5"/>
    <line x1="2" y1="3" x2="20" y2="-1" stroke="#5a1010" stroke-width="0.5"/>
  </g>

  <!-- TAIL (trails right/back) -->
  <path d="M 50,32 Q 64,30 72,38 Q 70,42 68,40" stroke="#a12e2e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <polygon points="68,36 78,38 68,42" fill="#a12e2e"/>
  <polygon points="70,38 76,38 70,40" fill="#cc4444"/>

  <!-- BODY -->
  <ellipse cx="38" cy="30" rx="14" ry="8" fill="#c13939"/>
  <ellipse cx="38" cy="28" rx="12" ry="5" fill="#d94a4a"/>
  <!-- belly/scales (yellow underside, profile view) -->
  <path d="M 28,32 L 50,32 L 48,37 L 30,37 Z" fill="#f5b545"/>
  <line x1="32" y1="34" x2="32" y2="36" stroke="#d89a30" stroke-width="0.5"/>
  <line x1="36" y1="34" x2="36" y2="36" stroke="#d89a30" stroke-width="0.5"/>
  <line x1="40" y1="34" x2="40" y2="36" stroke="#d89a30" stroke-width="0.5"/>
  <line x1="44" y1="34" x2="44" y2="36" stroke="#d89a30" stroke-width="0.5"/>

  <!-- NECK + HEAD (profile, facing LEFT) -->
  <path d="M 28,28 Q 22,26 20,24" stroke="#c13939" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- head -->
  <ellipse cx="18" cy="24" rx="8" ry="6" fill="#c13939"/>
  <!-- snout extending LEFT -->
  <polygon points="10,24 4,22 8,26 12,26" fill="#c13939"/>
  <!-- horns -->
  <polygon points="18,18 16,12 20,16" fill="#888888"/>
  <polygon points="22,18 24,12 20,16" fill="#888888"/>
  <!-- eye (on left side of head) -->
  <circle cx="14" cy="22" r="1.5" fill="#ffff00"/>
  <ellipse cx="14" cy="22" rx="0.6" ry="1.2" fill="#000"/>
  <!-- teeth -->
  <polygon points="8,26 7,28 10,27" fill="#ffffff"/>
  <polygon points="10,26 11,28 12,27" fill="#ffffff"/>

  <!-- FIRE BREATH -->
  <g>
    <animate attributeName="opacity" values="1;0.7;1;0.5;1" dur="0.4s" repeatCount="indefinite"/>
    <polygon points="4,22 -2,20 0,24 -4,26 2,26 0,28 4,26" fill="#ff6600"/>
    <polygon points="4,22 0,22 1,26 4,25" fill="#ffcc00"/>
    <polygon points="3,24 1,24 2,26" fill="#ffffff"/>
  </g>

  <!-- legs tucked under -->
  <rect x="34" y="36" width="3" height="5" fill="#8a2a2a"/>
  <rect x="42" y="36" width="3" height="5" fill="#8a2a2a"/>
  <polygon points="34,41 37,41 36,43 34,43" fill="#5a1a1a"/>
  <polygon points="42,41 45,41 44,43 42,43" fill="#5a1a1a"/>

  <!-- FRONT WING (near side, brighter) -->
  <g transform="translate(36,26)">
    <animateTransform attributeName="transform" type="rotate" values="-70 0 0; 50 0 0; -70 0 0" dur="0.7s" repeatCount="indefinite" additive="sum"/>
    <path d="M 0,0 Q 16,-14 26,-4 Q 22,6 0,5 Z" fill="#a12e2e"/>
    <line x1="2" y1="2" x2="20" y2="-6" stroke="#7a1a1a" stroke-width="0.5"/>
    <line x1="2" y1="3" x2="22" y2="-2" stroke="#7a1a1a" stroke-width="0.5"/>
    <line x1="2" y1="4" x2="16" y2="4" stroke="#7a1a1a" stroke-width="0.5"/>
  </g>
</svg>
