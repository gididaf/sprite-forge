<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <ellipse cx="32" cy="58" rx="20" ry="2" fill="rgba(0,0,0,0.25)"/>

  <!-- chest base -->
  <rect x="12" y="34" width="40" height="22" fill="#6b4423"/>
  <rect x="12" y="34" width="40" height="22" fill="none" stroke="#3a2411" stroke-width="1.5"/>
  <!-- wood plank lines -->
  <line x1="22" y1="34" x2="22" y2="56" stroke="#3a2411" stroke-width="1"/>
  <line x1="32" y1="34" x2="32" y2="56" stroke="#3a2411" stroke-width="1"/>
  <line x1="42" y1="34" x2="42" y2="56" stroke="#3a2411" stroke-width="1"/>
  <!-- metal bands -->
  <rect x="12" y="38" width="40" height="2" fill="#4a3a1a"/>
  <rect x="12" y="50" width="40" height="2" fill="#4a3a1a"/>
  <!-- lock plate -->
  <rect x="27" y="42" width="10" height="8" fill="#ccaa44"/>
  <rect x="27" y="42" width="10" height="8" fill="none" stroke="#6a4a11" stroke-width="1"/>
  <circle cx="32" cy="46" r="1.8" fill="#3a2411"/>

  <!-- interior (revealed when lid opens) -->
  <rect x="13" y="30" width="38" height="6" fill="#1a0a0a"/>

  <!-- gold/light rays (emerge when open) -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" dur="2.4s" repeatCount="indefinite"/>
    <!-- radiant rays -->
    <polygon points="32,32 20,8 26,32" fill="#ffee00" opacity="0.4"/>
    <polygon points="32,32 32,6 38,32" fill="#ffee00" opacity="0.5"/>
    <polygon points="32,32 44,8 38,32" fill="#ffee00" opacity="0.4"/>
    <polygon points="32,32 10,18 24,32" fill="#ffee00" opacity="0.3"/>
    <polygon points="32,32 54,18 40,32" fill="#ffee00" opacity="0.3"/>
  </g>

  <!-- gold coins/gems -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" dur="2.4s" repeatCount="indefinite"/>
    <!-- coins visible through top -->
    <circle cx="20" cy="32" r="2.5" fill="#ffd700"/>
    <circle cx="20" cy="32" r="1" fill="#ffee66"/>
    <circle cx="28" cy="30" r="2.5" fill="#ffd700"/>
    <circle cx="28" cy="30" r="1" fill="#ffee66"/>
    <circle cx="36" cy="31" r="2.5" fill="#ffd700"/>
    <circle cx="36" cy="31" r="1" fill="#ffee66"/>
    <circle cx="44" cy="32" r="2.5" fill="#ffd700"/>
    <circle cx="44" cy="32" r="1" fill="#ffee66"/>
    <!-- gem -->
    <polygon points="32,26 28,29 32,33 36,29" fill="#ff33aa"/>
    <polygon points="32,26 30,28 32,30 34,28" fill="#ff77cc"/>
  </g>

  <!-- sparkles -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" dur="2.4s" repeatCount="indefinite"/>
    <polygon points="16,20 17,23 20,24 17,25 16,28 15,25 12,24 15,23" fill="#ffffff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.4s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="48,16 49,19 52,20 49,21 48,24 47,21 44,20 47,19" fill="#ffffff">
      <animate attributeName="opacity" values="1;0.5;1" dur="0.5s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- CHEST LID: pivot around hinge at top-back (right side at x=52, y=34). The lid rotates around (52,34). -->
  <g transform="translate(52,34)">
    <animateTransform attributeName="transform" type="rotate"
      values="0; 0; -75; -75; 0; 0"
      dur="2.4s" repeatCount="indefinite" additive="sum"/>
    <!-- lid body extends to the LEFT from pivot (x from -40 to 0) -->
    <rect x="-40" y="-12" width="40" height="12" fill="#8b5a2b"/>
    <rect x="-40" y="-12" width="40" height="12" fill="none" stroke="#3a2411" stroke-width="1.5"/>
    <!-- curved lid top -->
    <path d="M -40,-12 Q -20,-18 0,-12" fill="#8b5a2b" stroke="#3a2411" stroke-width="1.5"/>
    <!-- lid metal band -->
    <rect x="-40" y="-4" width="40" height="2" fill="#4a3a1a"/>
    <!-- lid plank lines -->
    <line x1="-30" y1="-12" x2="-30" y2="0" stroke="#3a2411" stroke-width="1"/>
    <line x1="-20" y1="-16" x2="-20" y2="0" stroke="#3a2411" stroke-width="1"/>
    <line x1="-10" y1="-14" x2="-10" y2="0" stroke="#3a2411" stroke-width="1"/>
    <!-- hinge pin visible -->
    <circle cx="-1" cy="-1" r="1.5" fill="#4a3a1a"/>
  </g>
</svg>
