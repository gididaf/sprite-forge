<!-- humanoid_brute.svg — bulky humanoid (ogre/troll/large warrior), facing LEFT
     Wider viewBox (80) for broader silhouette. Hunched posture, thick limbs. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64">
  <ellipse cx="40" cy="60" rx="14" ry="2" fill="rgba(0,0,0,0.25)"/>

  <!-- BACK LEG (thick) -->
  <g id="back-leg" transform="translate(44,42)">
    <rect x="-4" y="0" width="8" height="14" fill="#5a5a5a"/>
    <rect x="-6" y="13" width="11" height="3" fill="#303030"/>
  </g>

  <!-- BACK ARM (long, dangling — brutes have low-hanging arms) -->
  <g id="back-arm" transform="translate(46,22)">
    <rect x="-3" y="0" width="7" height="20" fill="#5a5a5a"/>
    <circle cx="0.5" cy="22" r="3.5" fill="#8a8a8a"/>
  </g>

  <!-- TORSO (bulky, hunched forward) -->
  <polygon id="torso" points="32,18 44,18 47,42 30,42" fill="#8a8a8a"/>

  <!-- HEAD (low-slung, small relative to body) -->
  <g id="head" transform="translate(34,16)">
    <ellipse cx="0" cy="0" rx="7" ry="5.5" fill="#a0a0a0"/>
    <circle cx="-4" cy="-1" r="1.2" fill="#202020"/>
    <!-- tusks -->
    <polygon points="-5,3 -3,3 -4,5" fill="#e8e0d0"/>
    <polygon points="-3,3 -1,3 -2,4.5" fill="#e8e0d0"/>
  </g>

  <!-- FRONT ARM (long, dangling forward) -->
  <g id="front-arm" transform="translate(32,22)">
    <rect x="-3" y="0" width="7" height="20" fill="#8a8a8a"/>
    <circle cx="-0.5" cy="22" r="3.5" fill="#a8a8a8"/>
  </g>

  <!-- FRONT LEG (thick) -->
  <g id="front-leg" transform="translate(36,42)">
    <rect x="-4" y="0" width="8" height="14" fill="#8a8a8a"/>
    <rect x="-6" y="13" width="11" height="3" fill="#505050"/>
  </g>
</svg>
