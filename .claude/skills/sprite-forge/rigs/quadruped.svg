<!-- quadruped.svg — basic four-legged side-view (horse/deer/dog), facing LEFT
     viewBox 80x64 for wider profile. Four legs at hip/shoulder pivots. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64">
  <ellipse cx="40" cy="58" rx="22" ry="2" fill="rgba(0,0,0,0.2)"/>

  <!-- BACK LEGS (rear pair, darker — joint at hip) -->
  <g id="back-hindleg" transform="translate(56,38)">
    <rect x="-2.5" y="0" width="5" height="16" fill="#5a5a5a"/>
    <rect x="-3.5" y="15" width="7" height="3" fill="#303030"/>
  </g>
  <g id="back-foreleg" transform="translate(28,38)">
    <rect x="-2.5" y="0" width="5" height="16" fill="#5a5a5a"/>
    <rect x="-3.5" y="15" width="7" height="3" fill="#303030"/>
  </g>

  <!-- BODY (long horizontal) -->
  <rect id="body" x="20" y="26" width="40" height="14" fill="#8a8a8a"/>
  <rect id="rump" x="56" y="24" width="8" height="16" fill="#8a8a8a"/>

  <!-- NECK (angled up-left toward head) -->
  <polygon id="neck" points="16,28 26,28 22,18 14,20" fill="#8a8a8a"/>

  <!-- HEAD (facing LEFT) -->
  <g id="head" transform="translate(13,18)">
    <ellipse cx="0" cy="0" rx="6" ry="4" fill="#9a9a9a"/>
    <!-- snout extends left -->
    <rect x="-9" y="-1.5" width="5" height="4" fill="#9a9a9a"/>
    <circle cx="-3" cy="-1.5" r="0.8" fill="#202020"/>
    <!-- ear -->
    <polygon points="2,-4 5,-2 3,-5" fill="#9a9a9a"/>
  </g>

  <!-- TAIL (joint at rump) -->
  <g id="tail" transform="translate(62,28)">
    <rect x="0" y="-1.5" width="10" height="3" fill="#7a7a7a"/>
  </g>

  <!-- FRONT LEGS (lighter, slightly forward of back legs) -->
  <g id="front-foreleg" transform="translate(26,38)">
    <rect x="-2.5" y="0" width="5" height="16" fill="#a0a0a0"/>
    <rect x="-3.5" y="15" width="7" height="3" fill="#505050"/>
  </g>
  <g id="front-hindleg" transform="translate(54,38)">
    <rect x="-2.5" y="0" width="5" height="16" fill="#a0a0a0"/>
    <rect x="-3.5" y="15" width="7" height="3" fill="#505050"/>
  </g>
</svg>
